server:
  port: 8080

spring:
  application:
    name: myauth-generator
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/myauth?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: saSA123

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT配置
jwt:
  secret: myauth-secret-key-for-jwt-token-generation-2024
  expiration: 86400000  # 24小时

# License配置
license:
  private-key-path: license/private.key
  public-key-path: license/public.key
